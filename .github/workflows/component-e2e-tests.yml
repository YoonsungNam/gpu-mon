---
# Docker-based integration tests.
# Split by intent:
#   - Component: service-level smoke tests in the composed dev stack
#   - E2E: full pipeline verification across the stack
#
# On docs-only changes, jobs are skipped (GitHub treats skipped as passing
# for required status checks when strict mode is off).

name: Docker Integration Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            runtime:
              - 'src/**'
              - 'charts/**'
              - 'compose/**'
              - 'schemas/**'
              - 'environments/**'
              - 'tests/**'
              - 'scripts/**'
              - 'helmfile.yaml'
              - 'pyproject.toml'
              - 'Makefile'
              - '.github/workflows/component-e2e-tests.yml'

  component:
    name: Component Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.runtime == 'true'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -e ".[test]"

      - name: Build Docker images
        run: make build-images

      - name: Start Docker Compose stack
        run: make dev-up

      - name: Wait for stack to be ready
        run: |
          echo "Waiting for mock-dcgm-exporter health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9400/health; then
              echo "Stack is ready"
              break
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done
          curl -sf http://localhost:9400/health || (echo "Stack not ready after 150s" && exit 1)

      - name: Wait for VictoriaMetrics to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8481/select/0/prometheus/api/v1/query?query=up; then
              echo "vmselect ready"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:8481/select/0/prometheus/api/v1/query?query=up || (echo "vmselect not ready after 60s" && exit 1)

      - name: Wait for ClickHouse to be ready
        run: |
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8123/ping; then
              echo "ClickHouse HTTP endpoint ready"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:8123/ping || (echo "ClickHouse not ready after 120s" && exit 1)

      - name: Apply ClickHouse schema
        run: |
          cat compose/clickhouse-init/00-gpu-monitoring.sql | \
            docker compose -f compose/docker-compose.yaml exec -T clickhouse \
            clickhouse-client --multiquery
          echo "Schema applied, verifying..."
          result=$(docker compose -f compose/docker-compose.yaml exec -T clickhouse \
            clickhouse-client -q \
            "SELECT count() FROM system.tables WHERE database='gpu_monitoring' AND name='gpu_unified_logs' FORMAT TabSeparatedRaw" | tr -d '\r\n')
          echo "gpu_unified_logs table count: $result"
          [ "$result" = "1" ] || (echo "Schema verification failed" && exit 1)

      - name: Wait for Grafana to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Grafana ready"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:3000/api/health || (echo "Grafana not ready after 60s" && exit 1)

      - name: Run component tests
        run: pytest tests/component -m component -v --tb=short

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose logs ==="
          make dev-logs || docker compose -f compose/docker-compose.yaml logs --tail=100

      - name: Tear down Docker Compose stack
        if: always()
        run: make dev-down

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.runtime == 'true'
    timeout-minutes: 20
    # Runs in parallel with component (each job gets its own runner/stack)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -e ".[test]"

      - name: Build Docker images
        run: make build-images

      - name: Start Docker Compose stack
        run: make dev-up

      - name: Wait for stack to be ready
        run: |
          echo "Waiting for mock-dcgm-exporter health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9400/health; then
              echo "Stack is ready"
              break
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done
          curl -sf http://localhost:9400/health || (echo "Stack not ready after 150s" && exit 1)

      - name: Wait for VictoriaMetrics to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8481/select/0/prometheus/api/v1/query?query=up; then
              echo "vmselect ready"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:8481/select/0/prometheus/api/v1/query?query=up || (echo "vmselect not ready after 60s" && exit 1)

      - name: Wait for ClickHouse to be ready
        run: |
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8123/ping; then
              echo "ClickHouse HTTP endpoint ready"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:8123/ping || (echo "ClickHouse not ready after 120s" && exit 1)

      - name: Apply ClickHouse schema
        run: |
          cat compose/clickhouse-init/00-gpu-monitoring.sql | \
            docker compose -f compose/docker-compose.yaml exec -T clickhouse \
            clickhouse-client --multiquery
          echo "Schema applied, verifying..."
          result=$(docker compose -f compose/docker-compose.yaml exec -T clickhouse \
            clickhouse-client -q \
            "SELECT count() FROM system.tables WHERE database='gpu_monitoring' AND name='gpu_unified_logs' FORMAT TabSeparatedRaw" | tr -d '\r\n')
          echo "gpu_unified_logs table count: $result"
          [ "$result" = "1" ] || (echo "Schema verification failed" && exit 1)

      - name: Wait for Grafana to be ready
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Grafana ready"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:3000/api/health || (echo "Grafana not ready after 60s" && exit 1)

      - name: Run E2E tests
        run: pytest tests/e2e -m e2e -v --tb=short

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose logs ==="
          make dev-logs || docker compose -f compose/docker-compose.yaml logs --tail=100

      - name: Tear down Docker Compose stack
        if: always()
        run: make dev-down

