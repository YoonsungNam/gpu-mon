---
# Build and push custom container images to GHCR.
# Runs on push to dev/main when source files change.

name: Docker Build & Push

on:
  push:
    branches: [dev, main]
    paths:
      - "src/mock-dcgm-exporter/**"
      - "src/metadata-collector/**"
      - ".github/workflows/docker-build-push.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  changes:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      mock-dcgm-exporter: ${{ steps.filter.outputs.mock-dcgm-exporter }}
      metadata-collector: ${{ steps.filter.outputs.metadata-collector }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mock-dcgm-exporter:
              - 'src/mock-dcgm-exporter/**'
            metadata-collector:
              - 'src/metadata-collector/**'

  build-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: mock-dcgm-exporter
            context: src/mock-dcgm-exporter
            changed: ${{ needs.changes.outputs.mock-dcgm-exporter }}
          - image: metadata-collector
            context: src/metadata-collector
            changed: ${{ needs.changes.outputs.metadata-collector }}
    if: needs.changes.outputs.mock-dcgm-exporter == 'true' || needs.changes.outputs.metadata-collector == 'true'

    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Log in to GHCR
        if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
