suite: vmagent-central RBAC
templates:
  - templates/serviceaccount.yaml

tests:
  - it: renders ServiceAccount
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount

  - it: renders ClusterRole
    documentIndex: 1
    asserts:
      - isKind:
          of: ClusterRole

  - it: ClusterRole allows get/list/watch on pods
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [nodes, nodes/proxy, nodes/metrics, services, endpoints, pods]
            verbs: [get, list, watch]

  - it: ClusterRole allows /metrics non-resource URL
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            nonResourceURLs: [/metrics, /metrics/cadvisor]
            verbs: [get]

  - it: renders ClusterRoleBinding
    documentIndex: 2
    asserts:
      - isKind:
          of: ClusterRoleBinding

  - it: ClusterRoleBinding references correct ServiceAccount
    documentIndex: 2
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
